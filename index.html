<!DOCTYPE html>
<html lang ="en">

    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>KENYAN DICTIONARY</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <header>
            <div class="brand">KENYAN DICTIONARY</div>
            <button id="themeToggle" arial-label="Toggle dark theme">GizGiz</button>
        </header>
        
        <main>


            <section class="search-section">
                <form id="searchFrom" class="search-bar" role="search" aria-label="search for a word">
                    <label for="wordInput" 
                        class="visually-hidden"
                        >Uliza Bro
                    </label>

                    <input
                        type="text"
                        id="wordInput"
                        name="word"
                        placeholder="Look up a word"
                        aria-label="Word to search"
                        autocomplete="off"
                    >
                    <button 
                        type="submit" 
                        arial-label="Search for definition"
                        >Tafuta
                    </button>
                </form>
            <p class="hint">Tebu jaribu "Hello".</p>
            <p id="loading" class="hidden" role="status">Medi Nitafute..</p>
            </section>

            <section class="message-section">
                <div id="errorMessage" role="alert"></div>
            </section>
        
            <section class="result-section"></section>   
                <div id="results" class="hidden">
            </section>

            <section id="saveSection">
                <h2>Save Hapa Bro</h2>
                <p id="saveEmpty">No Saved Words</p> 
                <ul id="saveWordList" ariel-label="Your Save Words"></ul>
            </section>

            <section class="favorites-section">
                <h2>Favorites</h2>
                <p id="fovoritesEmpty"></p>
                <ul id="FavouriteList"></ul> 
            </section>


        </main>

        <script 
        src="./js/index.js" defer>
        </script>

    </body>
</html>
