<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kenyan Dictionary</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="body">

  <header class="header box">
    <div class="brand">KENYAN <span>DICTIONARY</span></div>
    <button id="themeToggle" aria-label="Toggle dark theme">Giza mode</button>
  </header>

  <main>

    <!-- SEARCH SECTION -->
    <section class="box search-section">
      <h2 class="box-title">Search</h2>
      <form id="searchForm">
        <label for="wordInput" class="visually-hidden">Uliza Bro</label>
        <input
          type="text"
          id="wordInput"
          name="word"
          placeholder="Andika neno... e.g. hello"
          autocomplete="off"
        >
        <button type="submit" id="searchBtn">Tafuta</button>
      </form>
      <p class="hint">Try "hello".</p>
      <p id="loading" class="hidden" role="status">Searching...</p>
      <div id="errorMessage" class="hidden" role="alert"></div>
    </section>

    <!-- DEFINITION SECTION -->
    <section class="box">
      <h2 class="box-title">Definition</h2>
      <div id="results" class="hidden"></div>
      <p id="resultsEmpty" class="empty-text">Search a word above to see its definition here.</p>
    </section>

    <!-- FAVORITES SECTION -->
    <section class="box">
      <h2 class="box-title">Saved Words</h2>
      <p id="favoritesEmpty" class="empty-text">No saved words yet. Hit ☆ Save on a word to keep it here.</p>
      <ul id="favoritesList"></ul>
    </section>

  </main>

  <script src="./js/index.js" defer></script>
</body>
</html>
