<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kenyan Dictionary</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="header box">
    <div class="brand"> KENYAN <span> DICTIONARY </span> </div>

    <button
        id="themeToggle"
        type="button"
        aria-label="Toggle dark mode">
        Giza
    </button>
  </header>

  <main>

    <!-- SEARCH SECTION -->
    <section class="box search-section">
      <h2 class="box-title">Search</h2>

      <form id="searchForm">

        <label for="wordInput" class="visually-hidden">
          Search for a word
        </label>

        <input
            type="text"
            id="wordInput"
            name="word"
            placeholder="Andika kitu/ Write something."
            autocomplete="off"
        >

        <button
            type="submit"
            id="searchBtn">
            Search
        </button>

      </form>

      <p class="hint">
        Try searching for words like "hello",
      </p>

      <p
        id="loading"
        class="hidden"
        role="status">
        Searching...
      </p>

      <div
        id="errorMessage"
        class="hidden"
        role="alert">
      </div>

    </section>

    <!--  RESULTS SECTION -->
    <section class="box">

      <h2 class="box-title">Definition</h2>

      <div
          id="results"
          class="hidden">
      </div>

      <p id="resultsEmpty" class="empty-text"> Search to see the definition here. </p>

    </section>

    <!-- FAVORITES SECTION -->
    <section class="box">

        <h2 class="box-title">Favorite</h2>
        <ul id="favoritesList"></ul>
          <p id="favoritesEmpty" class="empty-text"> No Favorite mentioned, "Usikue mamba mslow" </p>

    </section>

  </main>

  <script src="index.js"></script>

</body>
</html>
